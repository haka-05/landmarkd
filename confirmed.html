<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Landmarkd — Email Confirmed</title>
<style>
  /* Pinned to light on purpose. This page is opened from an email client, and
     several in-app browsers apply a white background while still reporting
     prefers-color-scheme: dark — which made the light-on-dark text render as
     white-on-white. Every colour below is explicit so the two halves can never
     disagree. */
  :root { color-scheme: only light; }
  html, body { background: #ffffff; }
  body {
    font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 30rem; margin: 0 auto; padding: 5rem 1.5rem;
    line-height: 1.65; color: #111111;
    text-align: center;
  }
  .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: #1f9d55; color: #ffffff;
    display: flex; align-items: center; justify-content: center;
    font-size: 34px; margin: 0 auto 1.5rem;
  }
  h1 { font-size: 1.6rem; letter-spacing: -0.02em; margin: 0 0 .5rem; color: #111111; }
  p { margin: .6rem 0; color: #555555; }
  .card {
    margin-top: 2rem; padding: 1.25rem;
    border: 1px solid #e5e5e5; border-radius: 14px;
    background: #fafafa; font-size: .95rem; color: #111111;
  }
  .card strong { color: #111111; }
  .btn {
    display: inline-block; margin-top: 1.75rem;
    padding: .9rem 1.75rem; border-radius: 999px;
    background: #111111; color: #ffffff; text-decoration: none;
    font-weight: 600; font-size: .95rem;
  }
  .muted { font-size: .8rem; margin-top: 2.5rem; color: #777777; }
</style>
</head>
<body>
  <div class="check">&#10003;</div>
  <h1>You're all set</h1>
  <p>Your email is confirmed and your Landmarkd account is active.</p>

  <div class="card">
    Head back to the <strong>Landmarkd</strong> app and log in with your email and password.
  </div>

  <a class="btn" href="landmarkd://">Open Landmarkd</a>

  <p class="muted">If that button doesn't do anything, just close this tab and open the app yourself.</p>

<script>
  // The confirmation redirect carries access/refresh tokens in the URL fragment.
  // Nothing on this page needs them, and they shouldn't sit in the address bar
  // or browser history, so strip the fragment as soon as the page loads.
  if (window.location.hash) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
</script>
</body>
</html>
